name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile
        run: python -m py_compile scripts/process_pdf.py

      - name: Smoke-test the CLI
        run: |
          set -euo pipefail
          out=$(python3 scripts/process_pdf.py format "Smith et al." \
            "Attention Is All You Need: A Transformer Architecture" "2017")
          echo "$out"
          echo "$out" | grep -q "Smith et al. - Attention Is All You Need - 2017.pdf"

          # Two-author formatting
          python3 scripts/process_pdf.py format "Jones & Lee" "Deep Learning" "2020" \
            | grep -q "Jones & Lee - Deep Learning - 2020.pdf"

          # No-command path must return an error JSON and exit non-zero
          if python3 scripts/process_pdf.py; then
            echo "expected non-zero exit for missing command"; exit 1
          fi
