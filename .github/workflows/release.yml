name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build .skill bundle
        run: bash scripts/build_skill.sh

      - name: Extract changelog notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # Pull the section for this version out of CHANGELOG.md
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            /^## \[/ { flag=0 }
            /^\[[^]]+\]: / { flag=0 }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            printf 'Release %s\n' "$GITHUB_REF_NAME" > RELEASE_NOTES.md
          fi
          echo "----- notes -----"; cat RELEASE_NOTES.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
            gh release upload "$GITHUB_REF_NAME" rename-scientific-pdf.skill --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file RELEASE_NOTES.md \
              rename-scientific-pdf.skill
          fi
