<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="Animated demo of rename-scientific-pdf turning cryptic filenames into Author - Title - Year names">
  <!--
    Illustrative animation (not a screen recording). Shows the rename flow:
    cryptic / DOI-style filenames -> clean "Author - Title - Year.pdf".
  -->
  <style>
    .win   { fill: #1e1e2e; }
    .bar   { fill: #181825; }
    .txt   { fill: #cdd6f4; font-size: 16px; }
    .dim   { fill: #6c7086; font-size: 16px; }
    .old   { fill: #f38ba8; font-size: 15px; }
    .new   { fill: #a6e3a1; font-size: 15px; }
    .arrow { fill: #89b4fa; font-size: 15px; }
    .prompt{ fill: #f9e2af; font-size: 16px; }
    .ok    { fill: #a6e3a1; font-size: 15px; font-weight: 700; }

    .row { opacity: 0; }
    @keyframes appear { to { opacity: 1; } }

    /* Cursor blink */
    .cursor { fill: #cdd6f4; animation: blink 1.06s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* Sequential reveal; total loop ~9s */
    #r1 { animation: appear .01s linear .6s forwards; }
    #r2 { animation: appear .01s linear 2.0s forwards; }
    #r3 { animation: appear .01s linear 3.4s forwards; }
    #r4 { animation: appear .01s linear 4.8s forwards; }
    #done { animation: appear .01s linear 6.2s forwards; }

    /* restart the whole thing */
    #r1,#r2,#r3,#r4,#done { animation-iteration-count: 1; }
    svg { }
  </style>

  <!-- Window -->
  <rect class="win" x="2" y="2" width="816" height="476" rx="12"/>
  <rect class="bar" x="2" y="2" width="816" height="36" rx="12"/>
  <rect class="bar" x="2" y="20" width="816" height="18"/>
  <circle cx="24" cy="20" r="6" fill="#f38ba8"/>
  <circle cx="44" cy="20" r="6" fill="#f9e2af"/>
  <circle cx="64" cy="20" r="6" fill="#a6e3a1"/>
  <text class="dim" x="410" y="25" text-anchor="middle" font-size="13">rename-scientific-pdf</text>

  <!-- Prompt -->
  <text x="24" y="74" class="prompt">›</text>
  <text x="42" y="74" class="txt">Rename every PDF in ~/papers/ with Zotero-style names</text>
  <rect class="cursor" x="468" y="62" width="9" height="16"/>

  <!-- Rows: old name -> new name -->
  <g id="r1" class="row">
    <text x="42" y="126" class="old">10.1038-s41586-021-03819-2.pdf</text>
    <text x="330" y="126" class="arrow">→</text>
    <text x="356" y="126" class="new">Jumper et al. - Highly Accurate Protein Struct - 2021.pdf</text>
  </g>

  <g id="r2" class="row">
    <text x="42" y="162" class="old">journal.pone.0293119.pdf</text>
    <text x="330" y="162" class="arrow">→</text>
    <text x="356" y="162" class="new">Pérez &amp; García - Urban Heat Island Effects - 2023.pdf</text>
  </g>

  <g id="r3" class="row">
    <text x="42" y="198" class="old">2106.08295.pdf</text>
    <text x="330" y="198" class="arrow">→</text>
    <text x="356" y="198" class="new">Brown et al. - Language Models Are Few-Shot - 2020.pdf</text>
  </g>

  <g id="r4" class="row">
    <text x="42" y="234" class="old">scan001.pdf  (OCR)</text>
    <text x="330" y="234" class="arrow">→</text>
    <text x="356" y="234" class="new">Smith - Ceramic Analysis in the Levant - 1998.pdf</text>
  </g>

  <g id="done" class="row">
    <text x="42" y="286" class="ok">✓ Renamed 4 files</text>
    <text x="200" y="286" class="dim" font-size="15">· DOI lookup · CrossRef · Semantic Scholar · OCR</text>
  </g>
</svg>
